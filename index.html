<!DOCTYPE html>
<html>
<head>
<title>Sistema Reforço Escolar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Painel do Reforço Escolar</h1>

<div class="menu">
<button onclick="mostrar('alunos')">Alunos</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
<button onclick="mostrar('frequencia')">Frequência</button>
<button onclick="mostrar('avaliacao')">Avaliação</button>
</div>

<div id="alunos" class="tela">

<h2>Cadastrar Aluno</h2>

<input id="nomeAluno" placeholder="Nome do aluno">
<input id="responsavel" placeholder="Responsável">
<input id="telefone" placeholder="Telefone">
<input id="plano" placeholder="Plano (2x semana)">
<input id="valor" placeholder="Valor mensal">

<button onclick="cadastrarAluno()">Salvar</button>

<h3>Lista de alunos</h3>
<ul id="listaAlunos"></ul>

</div>

<div id="financeiro" class="tela">

<h2>Registrar pagamento</h2>

<input id="alunoPagamento" placeholder="Nome do aluno">
<input id="valorPagamento" placeholder="Valor">
<input id="mesPagamento" placeholder="Mês">

<button onclick="registrarPagamento()">Registrar</button>

<ul id="listaPagamentos"></ul>

</div>

<div id="frequencia" class="tela">

<h2>Registrar presença</h2>

<input id="alunoFreq" placeholder="Aluno">
<input id="dataFreq" placeholder="Data">

<button onclick="registrarPresenca()">Registrar</button>

<ul id="listaFrequencia"></ul>

</div>

<div id="avaliacao" class="tela">

<h2>Avaliação do aluno</h2>

<input id="alunoAvaliacao" placeholder="Aluno">
<input id="portugues" placeholder="Português">
<input id="matematica" placeholder="Matemática">
<input id="observacao" placeholder="Observação">

<button onclick="salvarAvaliacao()">Salvar</button>

<ul id="listaAvaliacoes"></ul>

</div>

<script src="app.js"></script>

</body>
</html><h2>Sistema do Reforço</h2>
